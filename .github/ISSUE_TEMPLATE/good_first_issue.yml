name: Good first issue
description: Small, well-scoped task suitable for new contributors
title: "[good first issue] "
labels: ["good-first-issue"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Link to docs/TODO_TRIAGE.md when applicable.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Suggested steps
      value: |
        1. Build and run `ctest -L smoke`
        2. Make the change
        3. Re-run smoke + relevant goldens
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
