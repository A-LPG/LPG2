name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure
        run: |
          extra=()
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # Force x64 so nested Visual Studio configures match the host.
            extra+=(-A x64)
          fi
          cmake \
            -S lpg2 \
            -B "$RUNNER_TEMP/lpg2-build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLPG2_REQUIRE_RUST_TESTS=ON \
            -DLPG2_WARNINGS_AS_ERRORS=${{ matrix.os == 'ubuntu-latest' && 'ON' || 'OFF' }} \
            "${extra[@]}"

      - name: Build
        run: cmake --build "$RUNNER_TEMP/lpg2-build" --config Release --parallel

      - name: Test
        run: >
          ctest
          --test-dir "$RUNNER_TEMP/lpg2-build"
          -C Release
          --output-on-failure
          --timeout 300
      - name: Verify install package
        run: cmake --build "$RUNNER_TEMP/lpg2-build" --config Release --target package

      - name: Verify source tree is clean
        run: |
          status="$(git status --porcelain --untracked-files=all)"
          if [[ -n "$status" ]]; then
            printf '%s\n' "$status"
            exit 1
          fi

  runtime-integration:
    name: Runtime parser/AST (Ubuntu)
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libicu-dev pkg-config ninja-build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Clone C++ runtime with nested submodules
        run: |
          set -euo pipefail
          # Nested utfcpp is more reliable via a fresh recurse clone than
          # sparse submodule checkouts on some runners.
          git clone --recurse-submodules --depth 1 \
            https://github.com/A-LPG/LPG-cpp-runtime.git \
            "$GITHUB_WORKSPACE/.deps/LPG-cpp-runtime"
          test -f "$GITHUB_WORKSPACE/.deps/LPG-cpp-runtime/third_party/utfcpp/source/utf8.h"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ runner.os }}-v1
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Configure with full runtime tests
        run: >
          cmake
          -S lpg2
          -B "$RUNNER_TEMP/lpg2-runtime"
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DLPG2_REQUIRE_RUST_TESTS=ON
          -DLPG2_REQUIRE_RUST_PARSER_TESTS=ON
          -DLPG2_REQUIRE_CPP_PARSER_TESTS=ON
          -DLPG2_RUST_RUNTIME_DIR=$GITHUB_WORKSPACE/runtime/LPG-rust-runtime/lpg2
          -DLPG2_CPP_RUNTIME_DIR=$GITHUB_WORKSPACE/.deps/LPG-cpp-runtime

      - name: Build
        run: cmake --build "$RUNNER_TEMP/lpg2-runtime" --config Release --parallel

      - name: Test runtime-only cases
        id: runtime_test
        run: |
          set -uo pipefail
          BUILD="$RUNNER_TEMP/lpg2-runtime"
          mkdir -p "$BUILD/ci-logs"
          tests=(
            rust_deterministic_parser_run
            rust_backtracking_parser_run
            rust_automatic_ast_nested_behavior
            rust_automatic_ast_list_behavior
            rust_automatic_ast_parent_behavior
            rust_automatic_ast_preorder_behavior
            rust_automatic_ast_env_behavior
            rust_automatic_ast_iface_behavior
            rust_automatic_ast_recover
            cpp_automatic_ast_nested
            cpp_automatic_ast_recover
            cpp_glr_ambiguous_e2e
          )
          failed=0
          for t in "${tests[@]}"; do
            echo "::group::${t}"
            log="$BUILD/ci-logs/${t}.log"
            if ! ctest --test-dir "$BUILD" -C Release -R "^${t}$" \
              --output-on-failure --timeout 600 2>&1 | tee "$log"; then
              message="$(python3 -c 'import sys; text=open(sys.argv[1], errors="replace").read()[-3500:]; print(text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A"))' "$log")"
              echo "::error title=${t}::ctest failed for ${t}%0A${message}"
              {
                echo "### ${t} failed"
                echo '```'
                tail -n 120 "$log"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit "${failed}"

      - name: Upload runtime failure logs
        if: failure() && steps.runtime_test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: runtime-integration-logs
          path: ${{ runner.temp }}/lpg2-runtime/ci-logs/
          if-no-files-found: ignore

  java-runtime-integration:
    name: Java parser/AST (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configure with Java parser tests
        run: >
          cmake
          -S lpg2
          -B "$RUNNER_TEMP/lpg2-java"
          -DCMAKE_BUILD_TYPE=Release
          -DLPG2_REQUIRE_JAVA_PARSER_TESTS=ON
          -DLPG2_JAVA_RUNTIME_DIR=$GITHUB_WORKSPACE/runtime/lpg-runtime

      - name: Build
        run: cmake --build "$RUNNER_TEMP/lpg2-java" --config Release --parallel

      - name: Test java nested + recover + GLR AST
        id: java_test
        run: |
          set -uo pipefail
          BUILD="$RUNNER_TEMP/lpg2-java"
          mkdir -p "$BUILD/ci-logs"
          failed=0
          for t in java_automatic_ast_nested java_automatic_ast_recover \
                   java_glr_ambiguous_e2e java_glr_entry_e2e \
                   java_glr_rr_epsilon_e2e java_glr_correlation_e2e \
                   java_glr_symbol_identity_e2e \
                   java_glr_cyclic_e2e java_glr_non_ast_e2e; do
            echo "::group::${t}"
            log="$BUILD/ci-logs/${t}.log"
            if ! ctest --test-dir "$BUILD" -C Release -R "^${t}$" \
              --output-on-failure --timeout 600 2>&1 | tee "$log"; then
              {
                echo "### ${t} failed"
                echo '```'
                tail -n 120 "$log"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit "${failed}"

      - name: Upload Java failure logs
        if: failure() && steps.java_test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: java-runtime-integration-logs
          path: ${{ runner.temp }}/lpg2-java/ci-logs/
          if-no-files-found: ignore

  python-runtime-integration:
    name: Python parser/AST (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure with Python parser tests
        run: >
          cmake
          -S lpg2
          -B "$RUNNER_TEMP/lpg2-python"
          -DCMAKE_BUILD_TYPE=Release
          -DLPG2_REQUIRE_PYTHON_PARSER_TESTS=ON
          -DLPG2_PYTHON_RUNTIME_DIR=$GITHUB_WORKSPACE/runtime/LPG-python-runtime/Python3/src

      - name: Build
        run: cmake --build "$RUNNER_TEMP/lpg2-python" --config Release --parallel

      - name: Test python nested + recover AST
        id: python_test
        run: |
          set -uo pipefail
          BUILD="$RUNNER_TEMP/lpg2-python"
          mkdir -p "$BUILD/ci-logs"
          failed=0
          for t in python_automatic_ast_nested python_automatic_ast_recover; do
            echo "::group::${t}"
            log="$BUILD/ci-logs/${t}.log"
            if ! ctest --test-dir "$BUILD" -C Release -R "^${t}$" \
              --output-on-failure --timeout 600 2>&1 | tee "$log"; then
              {
                echo "### ${t} failed"
                echo '```'
                tail -n 120 "$log"
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit "${failed}"

      - name: Upload Python failure logs
        if: failure() && steps.python_test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: python-runtime-integration-logs
          path: ${{ runner.temp }}/lpg2-python/ci-logs/
          if-no-files-found: ignore

  go-runtime-integration:
    name: Go parser/AST (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Configure with Go parser tests
        run: >
          cmake
          -S lpg2
          -B "$RUNNER_TEMP/lpg2-go"
          -DCMAKE_BUILD_TYPE=Release
          -DLPG2_REQUIRE_GO_PARSER_TESTS=ON
          -DLPG2_GO_RUNTIME_DIR=$GITHUB_WORKSPACE/runtime/LPG-go-runtime

      - name: Build
