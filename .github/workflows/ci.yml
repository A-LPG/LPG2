  typescript-runtime-integration:
    name: TypeScript parser/AST (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure with TypeScript parser tests
        run: >
          cmake
          -S lpg2
          -B "$RUNNER_TEMP/lpg2-typescript"
          -DCMAKE_BUILD_TYPE=Release
          -DLPG2_REQUIRE_TYPESCRIPT_PARSER_TESTS=ON
          -DLPG2_TYPESCRIPT_RUNTIME_DIR=$GITHUB_WORKSPACE/runtime/LPG-typescript-runtime/lpg2ts

      - name: Build
        run: cmake --build "$RUNNER_TEMP/lpg2-typescript" --config Release --parallel

      - name: Test typescript nested + recover AST
