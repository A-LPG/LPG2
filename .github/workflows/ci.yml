      - name: Configure with Dart parser tests
        run: >
          cmake
          -S lpg2
          -B "$RUNNER_TEMP/lpg2-dart"
          -DCMAKE_BUILD_TYPE=Release
          -DLPG2_REQUIRE_DART_PARSER_TESTS=ON
          -DLPG2_DART_RUNTIME_DIR=$GITHUB_WORKSPACE/runtime/LPG-Dart-runtime

      - name: Build
        run: cmake --build "$RUNNER_TEMP/lpg2-dart" --config Release --parallel

      - name: Test dart nested + recover AST
