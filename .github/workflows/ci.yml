          -S lpg2
          -B "$RUNNER_TEMP/lpg2-csharp"
          -DCMAKE_BUILD_TYPE=Release
          -DLPG2_REQUIRE_CSHARP_PARSER_TESTS=ON
          -DLPG2_CSHARP_RUNTIME_DIR=$GITHUB_WORKSPACE/runtime/LPG-csharp-runtime/LPG2.Runtime

      - name: Build
        run: cmake --build "$RUNNER_TEMP/lpg2-csharp" --config Release --parallel

      - name: Test csharp nested + recover AST
