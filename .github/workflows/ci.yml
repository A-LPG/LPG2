name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure
        run: |
          extra=()
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # Force x64 so nested Visual Studio configures match the host.
            extra+=(-A x64)
          fi
          cmake \
            -S lpg2 \
            -B "$RUNNER_TEMP/lpg2-build" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLPG2_REQUIRE_RUST_TESTS=ON \
            "${extra[@]}"

      - name: Build
        run: cmake --build "$RUNNER_TEMP/lpg2-build" --config Release --parallel

      - name: Test
        run: >
          ctest
          --test-dir "$RUNNER_TEMP/lpg2-build"
          -C Release
          --output-on-failure
          --timeout 300
      - name: Verify install package
        run: cmake --build "$RUNNER_TEMP/lpg2-build" --config Release --target package

      - name: Verify source tree is clean
        run: |
          status="$(git status --porcelain --untracked-files=all)"
          if [[ -n "$status" ]]; then
            printf '%s\n' "$status"
            exit 1
          fi

  sanitizers:
    name: Linux ASan + UBSan
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
      # Generator intentionally retains long-lived tables/pools; leak checking
      # is covered by focused unit tests rather than full ctest under ASan.
      ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure sanitizers
        run: >
          cmake
          -S lpg2
          -B "$RUNNER_TEMP/lpg2-sanitize"
          -DCMAKE_BUILD_TYPE=Debug
          -DLPG2_ENABLE_SANITIZERS=ON
          -DLPG2_REQUIRE_RUST_TESTS=ON

      - name: Build
        run: cmake --build "$RUNNER_TEMP/lpg2-sanitize" --parallel

      - name: Test
        run: >
          ctest
          --test-dir "$RUNNER_TEMP/lpg2-sanitize"
          --output-on-failure
          --timeout 300

      - name: Verify source tree is clean
        run: |
          status="$(git status --porcelain --untracked-files=all)"
          if [[ -n "$status" ]]; then
            printf '%s\n' "$status"
            exit 1
          fi

  hygiene:
    name: Patch hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Reject whitespace errors in source
        run: |
          # Shallow default checkout has no HEAD^ (exit 128). Grammar/template
          # .gi files intentionally keep trailing spaces in some directives.
          base="$(git rev-parse --verify HEAD^ 2>/dev/null || true)"
          if [[ -z "$base" ]]; then
            echo "No parent commit available; skipping whitespace check."
            exit 0
          fi
          git diff --check "$base" HEAD -- \
            ':!*.gi' \
            ':!*.g' \
            ':!lpg-generator-templates-2.1.00/**'
