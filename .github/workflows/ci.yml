  calculator-examples:
    name: Calculator quickstarts (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libicu-dev pkg-config

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Clone C++ runtime with nested submodules
        run: |
          set -euo pipefail
          git clone --recurse-submodules --depth 1 \
            https://github.com/A-LPG/LPG-cpp-runtime.git \
            "$GITHUB_WORKSPACE/.deps/LPG-cpp-runtime"

      - name: Build generator
        run: |
          cmake -S lpg2 -B "$RUNNER_TEMP/lpg2-calc" -DCMAKE_BUILD_TYPE=Release
          cmake --build "$RUNNER_TEMP/lpg2-calc" --config Release --parallel
          echo "LPG_BIN=$RUNNER_TEMP/lpg2-calc/lpg-v2.3.0" >> "$GITHUB_ENV"

      - name: Point calculator C++ build at cloned runtime
        run: |
          # Prefer fresh clone for nested utfcpp (same as runtime-integration)
          rm -rf runtime/LPG-cpp-runtime
          ln -s "$GITHUB_WORKSPACE/.deps/LPG-cpp-runtime" runtime/LPG-cpp-runtime

      - name: Run calculator quickstarts (8 backends)
        run: ./examples/calculator/scripts/run.sh all

  sanitizers:
    name: Linux ASan + UBSan
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
      # Generator intentionally retains long-lived tables/pools; leak checking
      # is covered by focused unit tests rather than full ctest under ASan.
      ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure sanitizers
        run: >
          cmake
          -S lpg2
          -B "$RUNNER_TEMP/lpg2-sanitize"
          -DCMAKE_BUILD_TYPE=Debug
          -DLPG2_ENABLE_SANITIZERS=ON
          -DLPG2_REQUIRE_RUST_TESTS=ON

      - name: Build
        run: cmake --build "$RUNNER_TEMP/lpg2-sanitize" --parallel

      - name: Test
        run: >
          ctest
          --test-dir "$RUNNER_TEMP/lpg2-sanitize"
          --output-on-failure
          --timeout 300

      - name: Unit tests with leak detection
        env:
          # Full generator ctest keeps detect_leaks=0 (long-lived tables/pools).
          # Focused unit targets should stay leak-clean.
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: >
          ctest
          --test-dir "$RUNNER_TEMP/lpg2-sanitize"
          -L unit
          --output-on-failure
          --timeout 120

      - name: Verify source tree is clean
        run: |
          status="$(git status --porcelain --untracked-files=all)"
          if [[ -n "$status" ]]; then
            printf '%s\n' "$status"
            exit 1
          fi

  hygiene:
    name: Patch hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Reject whitespace errors in source
        run: |
          # Shallow default checkout has no HEAD^ (exit 128). Grammar/template
          # .gi files intentionally keep trailing spaces in some directives.
          base="$(git rev-parse --verify HEAD^ 2>/dev/null || true)"
          if [[ -z "$base" ]]; then
            echo "No parent commit available; skipping whitespace check."
            exit 0
          fi
          git diff --check "$base" HEAD -- \
            ':!*.gi' \
            ':!*.g' \
            ':!lpg-generator-templates-2.1.00/**' \
            ':!lpg2/tests/golden/**'
      - name: Check beginner / index doc relative links
        run: ./scripts/check-doc-links.sh

  perf-baseline:
    name: Perf baseline (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Configure and build
        run: |
          cmake -S lpg2 -B "$RUNNER_TEMP/lpg2-perf" -DCMAKE_BUILD_TYPE=Release
          cmake --build "$RUNNER_TEMP/lpg2-perf" --config Release --parallel
      - name: Run perf_baseline.sh
        id: perf
        run: |
          set +e
          LPG_BIN="$RUNNER_TEMP/lpg2-perf/lpg-v2.3.0" \
            RUNS=1 \
            PERF_WALL_SOFT_MAX=0.150 \
            ./lpg2/scripts/perf_baseline.sh | tee "$RUNNER_TEMP/perf_baseline_run.txt"
          ec=${PIPESTATUS[0]}
          set -e
          result="$(find /tmp -name perf_baseline.txt 2>/dev/null | head -1 || true)"
          if [[ -n "$result" ]]; then
            cat "$result"
            {
              echo "### Perf baseline"
              echo '```'
              cat "$result"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ "$ec" -eq 2 ]]; then
            echo "::error title=perf soft threshold::average_wall_sec exceeded PERF_WALL_SOFT_MAX (see docs/perf-baselines/THRESHOLDS.md)"
            echo "**SOFT THRESHOLD EXCEEDED** — open an issue if this repeats 3× on main." >> "$GITHUB_STEP_SUMMARY"
            exit 2
          fi
          exit "$ec"
