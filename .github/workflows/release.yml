name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: linux-x86_64
            extension: tar.gz
          - os: macos-latest
            asset: macos
            extension: tar.gz
          - os: windows-latest
            asset: windows-x86_64
            extension: zip
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure
        run: |
          extra=()
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            # Force x64 so nested Visual Studio configures match the host.
            extra+=(-A x64)
          fi
          cmake \
            -S lpg2 \
            -B "$RUNNER_TEMP/lpg2-release" \
            -DCMAKE_BUILD_TYPE=Release \
            -DLPG2_REQUIRE_RUST_TESTS=ON \
            "${extra[@]}"

      - name: Build and test
        run: |
          cmake --build "$RUNNER_TEMP/lpg2-release" --config Release --parallel
          ctest \
            --test-dir "$RUNNER_TEMP/lpg2-release" \
            -C Release \
            --output-on-failure \
            --timeout 300

      - name: Package
        run: |
          cmake --build "$RUNNER_TEMP/lpg2-release" --config Release --target package
          mkdir -p dist
          package="$(find "$RUNNER_TEMP/lpg2-release" -maxdepth 1 -type f -name "*.${{ matrix.extension }}" -print -quit)"
          test -n "$package"
          cp "$package" "dist/lpg2-${{ matrix.asset }}.${{ matrix.extension }}"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: lpg2-${{ matrix.asset }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: lpg2-*
          path: dist
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum lpg2-* > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  npm-package:
    name: Publish npm lpg2 wrapper
    if: startsWith(github.ref, 'refs/tags/')
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: npm/lpg2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Align package version with tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version = process.env.TAG;
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
        env:
          TAG: ${{ github.ref_name }}

      - name: Fix version (strip leading v)
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version = p.version.replace(/^v/, '');
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
            console.log('npm package version', p.version);
          "

      # postinstall downloads release assets; skip during pack/publish.
      - name: Publish to npm
        if: ${{ env.NODE_AUTH_TOKEN != '' }}
        run: |
          export LPG2_NPM_SKIP_DOWNLOAD=1
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip npm publish (no NPM_TOKEN)
        if: ${{ env.NODE_AUTH_TOKEN == '' }}
        run: echo "NPM_TOKEN not configured — skipped npm publish"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
